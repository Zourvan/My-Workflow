# Tmux Configuration
# Generated with TmuxAI Config Generator
# https://tmuxai.dev
# Fix for garbage OSC sequences + better truecolor support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",*256col*:RGB"


# -- Basic Settings ------------------------------------------
set -g prefix C-Space
set -g escape-time 500
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g mouse on

# -- Key Bindings ------------------------------------------

# Pane management
bind + split-window -v
bind | split-window -h

# Pane navigation
bind p select-pane -U

# -- Status Bar ---------------------------------------------
set -g status-position bottom
set -g status-interval 10
set -g status-left "#{?client_prefix,#[bg=red]PREFIX#[default],} #{session_name} "
set -g status-left-length 50
set -g status-right "#{cpu_percentage} #{ram_percentage} %H:%M"
set -g status-right-length 50

# -- Plugins -----------------------------------------------
# Plugin manager
set -g @plugin 'tmux-plugins/tpm'

# Theme
set -g @plugin 'catppuccin/tmux'

# CPU Monitoring
set -g @plugin 'tmux-plugins/tmux-cpu'

# Theme configuration
set -g @catppuccin_flavour mocha

# Other plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-sidebar'

# Initialize TMUX plugin manager
# Keep this line at the very bottom of tmux.conf
run '~/.tmux/plugins/tpm/tpm'